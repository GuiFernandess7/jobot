substitutions:
  _FUNCTION_NAME: jobot-trigger
  _REGION: us-central1
  _RUNTIME: go125
  _ENTRY_POINT: Trigger
  _TRIGGER_API_KEY_SECRET: jobot-trigger-api-key
  _TRIGGER_API_KEY_VERSION: latest

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - functions
      - deploy
      - ${_FUNCTION_NAME}
      - --gen2
      - --runtime
      - ${_RUNTIME}
      - --region
      - ${_REGION}
      - --source
      - .
      - --entry-point
      - ${_ENTRY_POINT}
      - --set-secrets
      - TRIGGER_API_KEY=${_TRIGGER_API_KEY_SECRET}:${_TRIGGER_API_KEY_VERSION}
      - --trigger-http
      - --allow-unauthenticated
