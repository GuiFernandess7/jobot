substitutions:
  _FUNCTION_NAME: jobot-trigger
  _REGION: us-central1
  _RUNTIME: go125
  _ENTRY_POINT: Trigger
  _DATABASE_URL_SECRET: jobot-database-url

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - functions
      - deploy
      - ${_FUNCTION_NAME}
      - --gen2
      - --runtime
      - ${_RUNTIME}
      - --region
      - ${_REGION}
      - --source
      - services/function
      - --entry-point
      - ${_ENTRY_POINT}
      - --remove-env-vars
      - DATABASE_URL
      - --set-secrets
      - DATABASE_URL=${_DATABASE_URL_SECRET}:latest
      - --trigger-http
