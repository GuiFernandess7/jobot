substitutions:
  _JOB_NAME: jobot-worker
  _REGION: us-central1
  _AR_REPOSITORY: jobot
  _IMAGE_NAME: worker
  _DATABASE_URL_SECRET: jobot-database-url
  _LLM_API_KEY_SECRET: jobot-llm-api-key
  _DISCORD_WEBHOOK_SECRET: jobot-discord-webhook-url

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/cloud-builders/docker
    dir: services/worker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - ${_JOB_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --set-secrets
      - DATABASE_URL=${_DATABASE_URL_SECRET}:latest,LLM_API_KEY=${_LLM_API_KEY_SECRET}:latest,DISCORD_WEBHOOK_URL=${_DISCORD_WEBHOOK_SECRET}:latest
